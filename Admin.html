<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dhanedha Movies</title>
    <style>
        /* Reset & Base */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: #141414;
            --accent-red: #c8102e;
            --accent-gold: #d4af37;
            --accent-green: #22c55e;
            --text-primary: #ffffff;
            --text-secondary: #a3a3a3;
            --text-muted: #737373;
            --border-color: #262626;
            --input-bg: #1f1f1f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .login-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
        }

        .login-box h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .login-box input:focus {
            outline: none;
            border-color: var(--accent-red);
        }

        .login-btn {
            width: 100%;
            background: var(--accent-red);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: #a00d26;
        }

        .error-msg {
            color: var(--accent-red);
            font-size: 0.875rem;
            margin-top: 0.75rem;
            text-align: center;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* Admin Dashboard */
        .admin-dashboard {
            display: none;
            min-height: 100vh;
        }

        .admin-dashboard.active {
            display: block;
        }

        /* Admin Header */
        .admin-header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h1 {
            font-size: 1.25rem;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        /* Admin Content */
        .admin-content {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Form Section */
        .form-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .form-section h2 {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            color: var(--text-primary);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.375rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 0.625rem 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-red);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input[type="date"] {
            color-scheme: dark;
        }

        /* Toggles */
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: var(--border-color);
            border-radius: 24px;
            transition: background 0.2s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--accent-red);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(20px);
        }

        .toggle-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .toggle-hint {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-left: 0.5rem;
        }

        .form-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            padding: 0.625rem 1.25rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--accent-red);
            color: white;
        }

        .btn-primary:hover {
            background: #a00d26;
        }

        .btn-secondary {
            background: var(--border-color);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: #333;
        }

        /* Video List Table */
        .list-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .list-section h2 {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .video-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        .video-table th,
        .video-table td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .video-table th {
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        .video-table tr:hover td {
            background: var(--bg-card);
        }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .badge-red {
            background: var(--accent-red);
            color: white;
        }

        .badge-gold {
            background: var(--accent-gold);
            color: black;
        }

        .badge-green {
            background: var(--accent-green);
            color: white;
        }

        .action-btns {
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            padding: 0.375rem 0.625rem;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .action-btn:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        .action-btn.edit:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }

        .action-btn.delete:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        .empty-table {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        /* Thumbnail Preview */
        .thumb-preview {
            width: 80px;
            height: 45px;
            object-fit: cover;
            border-radius: 4px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .admin-header {
                padding: 1rem;
            }

            .admin-content {
                padding: 1rem;
            }

            .video-table {
                font-size: 0.8rem;
            }

            .video-table th,
            .video-table td {
                padding: 0.5rem;
            }

            .thumb-preview {
                width: 60px;
                height: 34px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-screen" id="loginScreen">
        <div class="login-box">
            <h1>Admin Login</h1>
            <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="off">
            <button class="login-btn" onclick="login()">Login</button>
            <p class="error-msg" id="errorMsg">Invalid password</p>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <div class="admin-dashboard" id="adminDashboard">
        <header class="admin-header">
            <h1>Dhanedha Movies - Admin Panel</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </header>

        <div class="admin-content">
            <!-- Video Form -->
            <section class="form-section">
                <h2 id="formTitle">Add New Video</h2>
                <form id="videoForm" onsubmit="saveVideo(event)">
                    <input type="hidden" id="videoId">
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="title">Title *</label>
                            <input type="text" id="title" required placeholder="Enter video title">
                        </div>

                        <div class="form-group">
                            <label for="url">YouTube URL *</label>
                            <input type="url" id="url" required placeholder="https://youtube.com/watch?v=...">
                        </div>

                        <div class="form-group">
                            <label for="category">Category</label>
                            <input type="text" id="category" placeholder="Movie, Short Film, Trailer, Song...">
                        </div>

                        <div class="form-group">
                            <label for="date">Upload Date</label>
                            <input type="date" id="date">
                        </div>

                        <div class="form-group">
                            <label for="duration">Duration</label>
                            <input type="text" id="duration" placeholder="e.g. 2h 10m">
                        </div>

                        <div class="form-group full-width">
                            <label for="description">Description</label>
                            <textarea id="description" rows="3" placeholder="Optional description..."></textarea>
                        </div>

                        <div class="form-group">
                            <div class="toggle-group">
                                <label class="toggle-switch">
                                    <input type="checkbox" id="featured">
                                    <span class="toggle-slider"></span>
                                </label>
                                <span class="toggle-label">Featured</span>
                                <span class="toggle-hint">(only one allowed)</span>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="toggle-group">
                                <label class="toggle-switch">
                                    <input type="checkbox" id="pinned">
                                    <span class="toggle-slider"></span>
                                </label>
                                <span class="toggle-label">Pinned</span>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="toggle-group">
                                <label class="toggle-switch">
                                    <input type="checkbox" id="isNew">
                                    <span class="toggle-slider"></span>
                                </label>
                                <span class="toggle-label">New</span>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="saveBtn">Save Video</button>
                        <button type="button" class="btn btn-secondary" id="cancelBtn" onclick="resetForm()" style="display:none;">Cancel</button>
                    </div>
                </form>
            </section>

            <!-- Video List -->
            <section class="list-section">
                <h2>All Videos</h2>
                <div id="videoListContainer">
                    <table class="video-table" id="videoTable">
                        <thead>
                            <tr>
                                <th>Thumbnail</th>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="videoTableBody">
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <script>
        // Configuration
        const STORAGE_KEY = 'dm_videos';
        const ADMIN_PASSWORD = 'dhanedha2024';
        let videos = [];
        let editingId = null;

        // YouTube URL parser
        function extractVideoId(url) {
            if (!url) return null;
            const patterns = [
                /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
                /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
                /youtube\.com\/v\/([a-zA-Z0-9_-]{11})/,
                /youtu\.be\/([a-zA-Z0-9_-]{11})/,
                /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/
            ];
            for (const pattern of patterns) {
                const match = url.match(pattern);
                if (match) return match[1];
            }
            return null;
        }

        // Get thumbnail URL
        function getThumbnailUrl(videoId) {
            return `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
        }

        // Load videos from localStorage
        function loadVideos() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                videos = data ? JSON.parse(data) : [];
            } catch (e) {
                videos = [];
            }
        }

        // Save videos to localStorage
        function saveVideos() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(videos));
        }

        // Login
        function login() {
            const input = document.getElementById('passwordInput');
            const error = document.getElementById('errorMsg');
            
            if (input.value === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminDashboard').classList.add('active');
                input.value = '';
                error.classList.remove('show');
                renderVideoList();
            } else {
                error.classList.add('show');
                input.value = '';
            }
        }

        // Logout
        function logout() {
            document.getElementById('adminDashboard').classList.remove('active');
            document.getElementById('loginScreen').style.display = 'flex';
            resetForm();
        }

        // Handle Enter key on password field
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        // Save video
        function saveVideo(e) {
            e.preventDefault();
            
            const url = document.getElementById('url').value;
            const videoId = extractVideoId(url);
            
            if (!videoId) {
                alert('Could not extract video ID from the YouTube URL. Please check the URL.');
                return;
            }

            const isFeatured = document.getElementById('featured').checked;
            
            // If setting this as featured, remove featured from all others
            if (isFeatured && !editingId) {
                videos.forEach(v => v.featured = false);
            } else if (isFeatured && editingId) {
                videos.forEach(v => {
                    if (v.id !== editingId) v.featured = false;
                });
            }

            const videoData = {
                id: editingId || Date.now().toString(),
                title: document.getElementById('title').value,
                url: url,
                videoId: videoId,
                category: document.getElementById('category').value,
                date: document.getElementById('date').value,
                duration: document.getElementById('duration').value,
                description: document.getElementById('description').value,
                featured: isFeatured,
                pinned: document.getElementById('pinned').checked,
                isNew: document.getElementById('isNew').checked
            };

            if (editingId) {
                const index = videos.findIndex(v => v.id === editingId);
                if (index !== -1) {
                    videos[index] = videoData;
                }
            } else {
                videos.push(videoData);
            }

            saveVideos();
            resetForm();
            renderVideoList();
        }

        // Edit video
        function editVideo(id) {
            const video = videos.find(v => v.id === id);
            if (!video) return;

            editingId = id;
            document.getElementById('videoId').value = id;
            document.getElementById('title').value = video.title;
            document.getElementById('url').value = video.url;
            document.getElementById('category').value = video.category || '';
            document.getElementById('date').value = video.date || '';
            document.getElementById('duration').value = video.duration || '';
            document.getElementById('description').value = video.description || '';
            document.getElementById('featured').checked = video.featured;
            document.getElementById('pinned').checked = video.pinned;
            document.getElementById('isNew').checked = video.isNew;

            document.getElementById('formTitle').textContent = 'Edit Video';
            document.getElementById('saveBtn').textContent = 'Update Video';
            document.getElementById('cancelBtn').style.display = 'inline-block';
            
            // Scroll to form
            document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
        }

        // Delete video
        function deleteVideo(id) {
            if (!confirm('Are you sure you want to delete this video?')) return;
            
            videos = videos.filter(v => v.id !== id);
            saveVideos();
            
            if (editingId === id) {
                resetForm();
            }
            
            renderVideoList();
        }

        // Reset form
        function resetForm() {
            editingId = null;
            document.getElementById('videoForm').reset();
            document.getElementById('videoId').value = '';
            document.getElementById('formTitle').textContent = 'Add New Video';
            document.getElementById('saveBtn').textContent = 'Save Video';
            document.getElementById('cancelBtn').style.display = 'none';
        }

        // Render video list
        function renderVideoList() {
            const tbody = document.getElementById('videoTableBody');
            
            if (videos.length === 0) {
                document.getElementById('videoListContainer').innerHTML = `
                    <div class="empty-table">No videos added yet.</div>
                `;
                return;
            }

            // Sort by date (newest first)
            const sortedVideos = [...videos].sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));

            tbody.innerHTML = sortedVideos.map(video => {
                const badges = [];
                if (video.featured) badges.push('<span class="badge badge-red">Featured</span>');
                if (video.pinned) badges.push('<span class="badge badge-gold">Pinned</span>');
                if (video.isNew) badges.push('<span class="badge badge-green">New</span>');

                return `
                    <tr>
                        <td>
                            <img class="thumb-preview" src="${getThumbnailUrl(video.videoId)}" alt="">
                        </td>
                        <td>${video.title}</td>
                        <td>${video.category || '-'}</td>
                        <td>${video.date || '-'}</td>
                        <td>${badges.join(' ')}</td>
                        <td>
                            <div class="action-btns">
                                <button class="action-btn edit" onclick="editVideo('${video.id}')">Edit</button>
                                <button class="action-btn delete" onclick="deleteVideo('${video.id}')">Delete</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // Initialize
        loadVideos();
    </script>
</body>
</html>
